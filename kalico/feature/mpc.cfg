[gcode_macro MPC_CALIBRATE]
description: Run MPC calibration
rename_existing: _MPC_CALIBRATE
gcode:
    {% if 'STATUS_BUSY' in printer.gcode.commands %}
        STATUS_BUSY
    {% endif %}
    _MPC_CALIBRATE {rawparams}
    {% if 'STATUS_READY' in printer.gcode.commands %}
        STATUS_READY
    {% endif %}
