[heater_generic chamber]
heater_pin: ...
min_temp: 0
max_temp: 75
gcode_id: C
control: pid
pid_Kp: 61.470837
pid_Ki: 0.5
pid_Kd: 0

[verify_heater chamber]
max_error: 120
check_gain_time: 120
hysteresis: 50
heating_gain: 1

[gcode_macro M141]
description: Set Chamber Temperature
gcode:
    {% set TARGET = params.S | default(0) | float %}
    {% set CURRENT = printer['heater_generic chamber'].temperature %}

    {% if (TARGET > printer.heater_bed.target) and (TARGET > CURRENT) %}
        {action_raise_error("Bed not hot enough")}
    {% endif %}
    SET_HEATER_TEMPERATURE HEATER='chamber' TARGET={TARGET}


[gcode_macro M191]
description: Wait for Chamber Temperature
gcode:
    {% set TARGET = params.S | default(0) | float %}
    {% set CURRENT = printer['heater_generic chamber'].temperature %}

    M141 S{TARGET}

    {% if TARGET > CURRENT %}
        TEMPERATURE_WAIT SENSOR="heater_generic chamber" MINIMUM={TARGET}
    {% else %}
        TEMPERATURE_WAIT SENSOR="heater_generic chamber" MAXIMUM={TARGET}
    {% endif %}
