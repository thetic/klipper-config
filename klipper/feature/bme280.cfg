[gcode_macro QUERY_BME280]
description: Print readings from a BME280 sensor
gcode:
    {% set sensor_input = params.SENSOR | default('') | trim %}
    {% set sensor_key = sensor_input if sensor_input.startswith('bme280 ') else 'bme280 ' ~ sensor_input %}
    {% if sensor_input and sensor_key in printer %}
        {% set sensor = printer[sensor_key] %}
        {action_respond_info(
            "Temperature: %.2f C\n"
            "Pressure: %.2f hPa\n"
            "Humidity: %.2f%%" % (
                sensor.temperature,
                sensor.pressure,
                sensor.humidity))}
    {% else %}
        {% set ns = namespace(options=[]) %}
        {% for key in printer.configfile.config %}
            {% if key.startswith('bme280 ') %}
                {% set ns.options = ns.options + ["'" ~ key[7:] ~ "'"] %}
            {% endif %}
        {% endfor %}
        {% set options_str = ns.options | join(', ') %}
        {% if not sensor_input %}
            {action_raise_error("SENSOR is required. Options: " ~ options_str)}
        {% else %}
            {action_raise_error("The value '" ~ sensor_input ~ "' is not valid for SENSOR. Options: " ~ options_str)}
        {% endif %}
    {% endif %}
