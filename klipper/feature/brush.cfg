[gcode_macro BRUSH]
description: Wipe nozzle on brush
variable_brush_x_min: ...  # X coordinate of first corner
variable_brush_x_max: ...  # X coordinate of opposite corner
variable_brush_y_min: ...  # Y coordinate of first corner
variable_brush_y_max: ...  # Y coordinate of opposite corner
variable_brush_z: None     # Z height while wiping (required when gantry_brush is False)
variable_gantry_brush: False  # True = brush is gantry-mounted, no Z adjustment needed
variable_wipe_count: 6     # Number of wipe passes
variable_wipe_speed: 150   # Wipe speed in mm/s
variable_safe_z: 10        # Z height for safe XY travel
gcode:
    SAVE_GCODE_STATE NAME=_brush_state

    {% if 'STATUS_CLEANING' in printer.gcode.commands %}
        STATUS_CLEANING
    {% endif %}

    {% if not gantry_brush and brush_z is none %}
        { action_raise_error('brush_z must be set when gantry_brush is False') }
    {% endif %}

    {% set travel_speed = printer.toolhead.max_velocity * 60 | float %}
    {% set wipe_speed_f = wipe_speed * 60 | float %}
    {% set x_span = brush_x_max - brush_x_min %}
    {% set y_span = brush_y_max - brush_y_min %}

    G90

    {% if printer.toolhead.position.z < safe_z %}
        G0 Z{safe_z} F{travel_speed}
    {% endif %}

    {% if x_span >= y_span %}
        G0 X{brush_x_min} Y{(brush_y_min + brush_y_max) / 2} F{travel_speed}
        {% if not gantry_brush %}
            G0 Z{brush_z} F{travel_speed}
        {% endif %}
        {% for i in range(wipe_count) %}
            G0 X{brush_x_max} F{wipe_speed_f}
            G0 X{brush_x_min} F{wipe_speed_f}
        {% endfor %}
    {% else %}
        G0 X{(brush_x_min + brush_x_max) / 2} Y{brush_y_min} F{travel_speed}
        {% if not gantry_brush %}
            G0 Z{brush_z} F{travel_speed}
        {% endif %}
        {% for i in range(wipe_count) %}
            G0 Y{brush_y_max} F{wipe_speed_f}
            G0 Y{brush_y_min} F{wipe_speed_f}
        {% endfor %}
    {% endif %}

    G0 Z{safe_z} F{travel_speed}

    {% if 'STATUS_READY' in printer.gcode.commands %}
        STATUS_READY
    {% endif %}

    RESTORE_GCODE_STATE NAME=_brush_state
